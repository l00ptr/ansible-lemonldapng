---
_is_deb: "{{ ansible_facts['os_family'] == 'Debian' }}"
vhost_global_certificate_location: "{{ '/etc/ssl/certs/ssl-cert-snakeoil.pem' if _is_deb else ('/etc/ssl/certs/%s.pem' % ansible_facts['hostname']) }}"
vhost_global_certificate_key_location: "{{ '/etc/ssl/private/ssl-cert-snakeoil.key' if _is_deb else ('/etc/ssl/%s.key' % ansible_facts['hostname']) }}"
vhost_lua_module_available: "{{ _is_deb }}"
